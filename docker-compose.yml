version: '3.8'

services:
  backend:
    build: 
      context: ./backend
    container_name: fandex-api
    ports:
      - "5000:5000"
    volumes:
      - ./backend/db:/app/db
      - ./backend/static:/app/static
    environment:
      - FLASK_ENV=production
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:5000/api
    container_name: fandex-client
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
